name: govulncheck

on:
  schedule:
    - cron: '0 19 * * *' # UTC 19:00 = JST 04:00
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: 'go.mod'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        id: scan
        run: |
          set +e
          govulncheck --json ./... > /tmp/govulncheck.json 2>&1
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Create issues for vulnerabilities
        if: steps.scan.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          create_issue_if_new() {
            local vuln_id="$1"
            local module="$2"
            local title="govulncheck: ${vuln_id} in ${module}"

            existing=$(gh issue list --state open --search "${vuln_id}" --json number --jq 'length')
            if [ "$existing" -gt 0 ]; then
              echo "Issue for ${vuln_id} already exists, skipping."
              return
            fi

            gh issue create \
              --title "${title}" \
              --body "\`govulncheck\` detected **${vuln_id}** in \`${module}\`.

          See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for full output.

          Reference: https://pkg.go.dev/vuln/${vuln_id}" \
              --label bug
          }

          jq -r '.Vulnerabilities[]? | select(.Reachable) | .OSV as $osv | .Modules[] | "\($osv):\(.Module)"' \
            /tmp/govulncheck.json | sort -u | while IFS=: read -r vuln_id module; do
            create_issue_if_new "$vuln_id" "$module"
          done
